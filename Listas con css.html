<!DOCTYPE html>
<html>
<head>
    <title>Listas HTML</title>

    <style>
        body{
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        h1{
            color: darkblue;
        }

        h2{
            color: darkred;
        }

        ol{
            background-color: white;
            width: 250px;
            padding: 15px;
        }

        ul{
            background-color: white;
            width: 250px;
            padding: 15px;
        }
    </style>

</head>

<body>

    <h1>Listas Ordenadas</h1>

    <h2>Videojuegos favoritos</h2>

    <ol>
        <li>Street Fighter</li>
        <li>Super Smash Bros. Ultimate</li>
        <li>Fortnite</li>
        <li>Tekken</li>
        <li>Super Mario Galaxy</li>
    </ol>

    <h1>Listas Desordenadas</h1>

    <h2>Tareas del hogar</h2>

    <ul>
        <li>Limpiar el patio</li>
        <li>Tender la cama</li>
        <li>Tender la ropa</li>
        <li>Limpiar el cuarto</li>
        <li>Lavar los platos</li>
    </ul>

</body>
</html>
