<!DOCTYPE html>
<html>
<head>
    <title>Títulos con CSS</title>

    <style>
        body{
            background-color: #87CEEB; /* azul clarito */
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1{color:red;}
        h2{color:white;}
        h3{color:red;}
        h4{color:white;}
        h5{color:red;}
        h6{color:white;}
    </style>

</head>

<body>

    <h1>Sebastian</h1>

    <h2>Tu amigo Spider-Man</h2>

    <h3>Y tu amigable vecino Hombre Araña</h3>

    <h4>Con un gran poder</h4>

    <h5>Viene una gran responsabilidad</h5>

    <h6>Spider-Man es mi héroe favorito</h6>

    <h2>Protector de Nueva York</h2>

    <h3>Luchando contra los villanos</h3>

    <h4>Siempre dispuesto a ayudar</h4>

</body>
</html>
